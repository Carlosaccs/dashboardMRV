<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard MRV SP - Mobile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html { height: 100vh; width: 100vw; overflow: hidden; display: flex; }
        .sidebar-titulo { background: var(--mrv-verde); width: 40px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 15px 0; color: white; }
        .titulo-vertical { writing-mode: vertical-rl; transform: rotate(180deg); text-transform: uppercase; font-size: 0.65rem; font-weight: bold; }
        .main-wrapper { display: flex; flex: 1; height: 100vh; overflow: hidden; }
        .col-lista { width: 30%; background: var(--cinza-fundo); overflow-y: auto; padding: 5px; border-right: 1px solid var(--cinza-borda); }
        .col-central { flex: 1; display: flex; flex-direction: column; position: relative; }
        .centro-topo { height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; background: #fdfdfd; border-bottom: 1px solid #eee; }
        .mapa-container { flex: 1; position: relative; }
        .col-ficha { width: 35%; padding: 10px; overflow-y: auto; border-left: 1px solid var(--cinza-borda); }
        
        .btRes { padding: 8px 5px; font-size: 0.6rem; }
        .ficha-header { font-size: 0.7rem; color: var(--mrv-verde); font-weight: bold; margin-bottom: 5px; }
        .ficha-grid { display: grid; grid-template-columns: 1fr; gap: 5px; }
        .grid-item { font-size: 0.55rem; background: #f9f9f9; padding: 5px; border: 1px solid #eee; }
        .btn-mini { display: block; width: 100%; text-align: center; padding: 8px 0; background: var(--mrv-verde); color: white; text-decoration: none; border-radius: 4px; font-size: 0.6rem; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar-titulo">
        <span>⛶</span>
        <div class="titulo-vertical">DASHBOARD MRV SP</div>
        <span>⛶</span>
    </div>

    <div class="main-wrapper">
        <aside class="col-lista" id="lista-imoveis"></aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">Selecione uma região</div>
            <div class="mapa-container" id="caixa-a"></div>
        </main>

        <aside class="col-ficha" id="ficha-tecnica"></aside>
    </div>

    <div id="toast">Copiado!</div>

    <script src="mrv-data.js"></script>
    <script src="mrv-engine.js"></script>
    <script>
        function gerarListaLateral() {
            const list = document.getElementById('lista-imoveis');
            list.innerHTML = "";
            DADOS_PLANILHA.forEach(item => {
                if (item.tipo === 'N') {
                    const div = document.createElement('div');
                    div.className = 'item-grupo';
                    div.innerText = item.nome;
                    list.appendChild(div);
                } else {
                    const btn = document.createElement('button');
                    btn.className = `btRes tipo-${item.tipo}`;
                    btn.innerHTML = `<strong>${item.nome}</strong> ${obterHtmlEstoque(item.estoque, item.tipo)}`;
                    btn.onclick = () => selecionar(item, btn);
                    list.appendChild(btn);
                }
            });
            desenharIniciais();
        }

        function selecionar(item, btn) {
            document.querySelectorAll('.btRes').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            
            const path = document.getElementById(item.id_path);
            if(path) {
                if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
                path.classList.add('path-ativo');
                pathSelecionado = path;
                document.getElementById('display-nome').innerText = path.getAttribute('name');
            }

            document.getElementById('ficha-tecnica').innerHTML = `
                <div class="ficha-header">${item.nome}</div>
                <div style="font-size: 0.55rem; margin-bottom: 8px;">📍 ${item.bairro}</div>
                <div class="ficha-grid">
                    <div class="grid-item"><strong>Preço:</strong> ${item.preco}</div>
                    <div class="grid-item"><strong>Entrega:</strong> ${item.entrega}</div>
                </div>
                <a href="${item.links.bookCli}" target="_blank" class="btn-mini">📄 Book</a>
                <a href="${item.links.vid1}" target="_blank" class="btn-mini" style="background:var(--mrv-laranja)">🎥 Vídeo</a>
            `;
        }
        window.onload = iniciarApp;
    </script>
</body>
</html>
