<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard MRV SP v8.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">DASHBOARD MRV SP - GESTÃO DE ESTOQUE v8.5</div>

<div class="wrapper">
    <aside class="sidebar-esq" id="lista-imoveis">Carregando lista...</aside>
    
    <main class="conteudo-centro">
        <div id="cidade-titulo"></div> 
        <div id="caixa-a"></div> 
        <div id="caixa-b"></div> 
    </main>

    <aside class="sidebar-dir" id="ficha-tecnica">
        <div style="text-align:center; color:#ccc; margin-top:100px;">
            <p style="font-size: 30px;">📍</p>
            <p>Clique no mapa principal para ver os empreendimentos.</p>
        </div>
    </aside>
</div>

<script src="mrv-data.js"></script>
<script src="mrv-engine.js"></script>
<script>
    function gerarListaLateral() {
        const list = document.getElementById('lista-imoveis');
        if (!list) return;
        list.innerHTML = "";
        
        // ORDENAÇÃO PELA COLUNA "ORDEM" (10, 20, 30...)
        const listaOrdenada = [...DADOS_PLANILHA].sort((a, b) => a.ordem - b.ordem);

        listaOrdenada.forEach(item => {
            if (item.categoria === 'COMPLEXO') {
                // Registro COMPLEXO vira um cabeçalho escuro (Igual v6.8)
                const div = document.createElement('div');
                div.style = "background:#333; color:white; padding:8px; font-size:0.75rem; text-align:center; margin:15px 0 5px 0; border-radius:4px; font-weight:bold; text-transform:uppercase; letter-spacing:1px; cursor:pointer;";
                div.innerText = item.nome; // Usa o Nome Curto
                div.onclick = () => comandoSelecao(item.id_path, item.nomeFull, item);
                list.appendChild(div);
            } else {
                const btn = document.createElement('button');
                btn.className = `btRes`;
                // Geramos um ID limpo para o destaque funcionar
                btn.id = `btn-esq-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`;
                btn.innerHTML = `<strong>${item.nome}</strong> ${obterHtmlEstoque(item.estoque, item.categoria)}`;
                btn.onclick = () => comandoSelecao(item.id_path, item.cidade || "", item);
                list.appendChild(btn);
            }
        });
    }
    window.onload = iniciarApp;
</script>
</body>
</html>
