<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP - Gestão de Estoque</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Garantia visual contra tradutores que alteram o layout */
        .notranslate { translate: no !important; }
    </style>
</head>
<body>

    <div class="header">DASHBOARD MRV SP - GESTÃO DE ESTOQUE v9.2</div>

    <div class="wrapper">
        <aside class="sidebar-esq" id="lista-imoveis">
            <div style="padding:20px; color:#666;">Carregando residenciais...</div>
        </aside>
        
        <main class="conteudo-centro">
            <div id="cidade-titulo">Passe o mouse ou selecione uma cidade</div> 
            <div id="caixa-a"></div> 
            <div id="caixa-b"></div> 
        </main>

        <aside class="sidebar-dir" id="ficha-tecnica">
            <div style="text-align:center; color:#ccc; margin-top:100px;">
                <p style="font-size: 30px;">📍</p>
                <p>Selecione um empreendimento no mapa ou na lista lateral</p>
            </div>
        </aside>
    </div>

    <script src="mrv-data.js"></script>
    <script src="mrv-engine.js"></script>
    
    <script>
        /**
         * Gera a lista de botões na barra lateral esquerda 
         * Baseado nos dados processados pela planilha no mrv-engine.js
         */
        function gerarListaLateral() {
            const list = document.getElementById('lista-imoveis');
            if (!list) return;
            
            list.innerHTML = ""; // Limpa o "Carregando..."
            
            if (DADOS_PLANILHA.length === 0) {
                list.innerHTML = "<div style='padding:20px; color:red;'>Nenhum dado encontrado na planilha.</div>";
                return;
            }

            DADOS_PLANILHA.forEach(item => {
                // Pula itens que parecem ser erros de leitura (textos muito longos)
                if (!item.nome || item.nome.length > 45) return;

                if (item.tipo === 'N') {
                    // Renderiza como um divisor de Grupo/Cidade
                    const div = document.createElement('div');
                    div.className = "notranslate";
                    div.style = "background:#333; color:white; padding:8px; font-size:0.72rem; text-align:center; margin:15px 0 5px 0; border-radius:4px; font-weight:bold; text-transform:uppercase;";
                    div.innerText = item.nome; 
                    list.appendChild(div);
                } else {
                    // Renderiza como um botão de Residencial
                    const btn = document.createElement('button');
                    btn.className = `btRes notranslate`;
                    
                    // Cria um ID único para o botão para podermos marcar como 'ativo' depois
                    const idBotao = `btn-esq-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`;
                    btn.id = idBotao;
                    
                    // Monta o conteúdo do botão com o Nome e o Badge de Estoque
                    btn.innerHTML = `
                        <strong class="notranslate">${item.nome}</strong> 
                        ${obterHtmlEstoque(item.estoque, item.tipo)}
                    `;
                    
                    // Ação de clique: Chama a função principal do motor
                    btn.onclick = () => {
                        // Faz a seleção no mapa e abre a vitrine
                        comandoSelecao(item.id_path, item.cidade, item);
                    };
                    
                    list.appendChild(btn);
                }
            });
        }

        // --- GATILHO DE INICIALIZAÇÃO ---
        // Esta linha "liga" o sistema assim que a página termina de carregar
        window.onload = function() {
            if (typeof iniciarApp === 'function') {
                iniciarApp();
            } else {
                console.error("Erro: Função iniciarApp não encontrada no mrv-engine.js");
            }
        };
    </script>
</body>
</html>
