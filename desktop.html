<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard MRV SP v7.2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">DASHBOARD MRV SP - GESTÃO DE ESTOQUE v7.2</div>

<div class="wrapper">
    <aside class="sidebar-esq" id="lista-imoveis">Carregando...</aside>
    
    <main class="conteudo-centro">
        <div id="cidade-titulo"></div> 
        <div id="caixa-a"></div> 
        <div id="caixa-b"></div> 
    </main>

    <aside class="sidebar-dir" id="ficha-tecnica">
        <div style="text-align:center; color:#ccc; margin-top:100px;">
            <p style="font-size: 30px;">📍</p>
            <p>Selecione um complexo ou residencial.</p>
        </div>
    </aside>
</div>

<script src="mrv-data.js"></script>
<script src="mrv-engine.js"></script>
<script>
    function gerarListaLateral() {
        const list = document.getElementById('lista-imoveis');
        if (!list) return;
        list.innerHTML = "";
        
        // 1. ORDENAÇÃO: Cidade Sete Sóis (Tipo N) sempre no topo, depois ordem alfabética
        const itensSeteSois = DADOS_PLANILHA.filter(i => i.tipo === 'N').sort((a,b) => a.nome.localeCompare(b.nome));
        const itensResidenciais = DADOS_PLANILHA.filter(i => i.tipo !== 'N').sort((a,b) => a.nome.localeCompare(b.nome));
        
        const listaFinal = [...itensSeteSois, ...itensResidenciais];

        listaFinal.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'btRes';
            btn.id = `btn-esq-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`;
            
            // 2. CORREÇÃO DO CONTEÚDO DO BOTÃO:
            // Forçamos o botão a usar apenas o NOME, evitando que a OBS (campo longo) entre aqui.
            if (item.tipo === 'N') {
                btn.innerHTML = `<strong>🏢 ${item.nome.toUpperCase()}</strong> <span></span>`;
            } else {
                btn.innerHTML = `<strong>${item.nome}</strong> ${obterHtmlEstoque(item.estoque, item.tipo)}`;
            }

            btn.onclick = () => comandoSelecao(item.id_path, item.cidade, item);
            list.appendChild(btn);
        });
    }
    window.onload = iniciarApp;
</script>
</body>
</html>
