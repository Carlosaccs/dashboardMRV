<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP - v9.3</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajustes finos de transição para os botões */
        .btRes, .separador-complexo-btn {
            transition: all 0.2s ease-in-out;
        }
        .notranslate { translate: no !important; }
    </style>
</head>
<body>

    <div class="header">DASHBOARD MRV SP - GESTÃO DE ESTOQUE v9.3</div>

    <div class="wrapper">
        <aside class="sidebar-esq" id="lista-imoveis">
            <div style="padding:20px; color:#666; font-size: 0.8rem;">Carregando imóveis...</div>
        </aside>
        
        <main class="conteudo-centro">
            <div id="cidade-titulo">Passe o mouse ou selecione uma cidade</div> 
            <div id="caixa-a"></div> 
            <div id="caixa-b"></div> 
        </main>

        <aside class="sidebar-dir" id="ficha-tecnica">
            <div style="text-align:center; color:#ccc; margin-top:100px;">
                <p style="font-size: 30px;">📍</p>
                <p>Selecione uma região no mapa ou na lista ao lado</p>
            </div>
        </aside>
    </div>

    <script src="mrv-data.js"></script>
    <script src="mrv-engine.js"></script>
    
    <script>
        // Função que constrói a lista da esquerda com os IDs corretos para o destaque
        function gerarListaLateral() {
            const list = document.getElementById('lista-imoveis');
            if (!list) return;
            list.innerHTML = ""; 
            
            DADOS_PLANILHA.forEach(item => {
                if (!item.nome || item.nome.length > 45) return;

                const btn = document.createElement('button');
                
                // CRUCIAL: Criar o ID que o mrv-engine.js vai usar para colocar o fundo laranja
                // Remove caracteres especiais e espaços para o ID ser válido
                const idLimpo = item.nome.replace(/[^a-zA-Z0-9]/g, '-');
                btn.id = `btn-esq-${idLimpo}`;
                
                // Define a classe base (Complexo ou Residencial)
                btn.className = item.tipo === 'N' ? "separador-complexo-btn notranslate" : "btRes notranslate";
                
                // Conteúdo do botão
                btn.innerHTML = `<strong class="notranslate">${item.nome}</strong> ${obterHtmlEstoque(item.estoque, item.tipo)}`;
                
                // Ação de clique: seleciona no mapa e na vitrine
                btn.onclick = () => comandoSelecao(item.id_path, item.cidade, item);
                
                list.appendChild(btn);
            });
        }

        // Inicia o App assim que a página carrega
        window.onload = function() {
            if (typeof iniciarApp === 'function') {
                iniciarApp();
            }
        };
    </script>
</body>
</html>
