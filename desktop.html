<script>
    function gerarListaLateral() {
        const list = document.getElementById('lista-imoveis');
        if (!list) return;
        list.innerHTML = "";
        
        // ORDENAÇÃO MÁGICA: 
        // 1. Primeiro pela coluna ORDEM (10, 20, 30...)
        // 2. Em caso de empate na ordem, vai por Nome Alfabético
        const listaOrdenada = [...DADOS_PLANILHA].sort((a, b) => {
            if (a.ordem !== b.ordem) return a.ordem - b.ordem;
            return a.nome.localeCompare(b.nome);
        });

        listaOrdenada.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'btRes';
            btn.id = `btn-esq-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`;
            
            // Se for COMPLEXO, ganha um ícone diferenciado
            const prefixo = item.categoria === 'COMPLEXO' ? '🏢 ' : '';
            
            btn.innerHTML = `
                <strong>${prefixo}${item.nome}</strong> 
                ${obterHtmlEstoque(item.estoque, item.categoria)}
            `;

            btn.onclick = () => comandoSelecao(item.id_path, item.nomeFull, item);
            list.appendChild(btn);
        });
    }
    window.onload = iniciarApp;
</script>
